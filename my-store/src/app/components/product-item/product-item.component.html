<div class="product-container">
  <a [routerLink]="['/product', product.id]">
    <img [src]="product.url" class="product-image">
  </a>
  <h3>{{ product.name }}</h3>
  <p>{{ product.price | currency }}</p>
  
  <select [(ngModel)]="selectedQuantity" class="select-input">
    <option *ngFor="let q of quantities" [value]="q">{{ q }}</option>
  </select>
  
  <button (click)="addToCart(product)" class="btn-add">Add to cart</button>
</div>
